name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Start server
        run: |
          pnpm run start &
          pnpm dlx wait-on http://localhost:3000
      - name: Install Chrome for Puppeteer
        run: |
          pnpm exec puppeteer browsers install chrome
      - name: Visual smoke test (Puppeteer)
        run: |
          node ./scripts/ci-screenshots.js
